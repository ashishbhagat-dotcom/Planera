services:
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./client/src:/app/src
    environment:
      - VITE_PROXY_TARGET=http://api:8000
      - VITE_WS_PROXY_TARGET=ws://api:8000
    depends_on:
      - api

  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
    environment:
      - DATABASE_URL=postgres://planera:planera@db:5432/planera
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
      - SECRET_KEY=dev-secret-key-change-in-prod
      - EMAIL_BACKEND=django.core.mail.backends.smtp.EmailBackend
      - EMAIL_HOST=smtp.resend.com
      - EMAIL_PORT=465
      - EMAIL_USE_SSL=True
      - EMAIL_HOST_USER=resend
      - EMAIL_HOST_PASSWORD=${RESEND_API_KEY}
      - DEFAULT_FROM_EMAIL=${RESEND_FROM_EMAIL:-onboarding@resend.dev}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"

  celery:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: celery -A config.celery worker -l info
    volumes:
      - ./server:/app
    environment:
      - DATABASE_URL=postgres://planera:planera@db:5432/planera
      - REDIS_URL=redis://redis:6379/0
      - DJANGO_SETTINGS_MODULE=config.settings.development
    depends_on:
      - api
      - redis

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_DB=planera
      - POSTGRES_USER=planera
      - POSTGRES_PASSWORD=planera
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U planera"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: